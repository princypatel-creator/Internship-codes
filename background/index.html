<html>
    <head>
        <style>
            div{
                width: 453px;
                height:345px;
                margin: 23px;
            }
            .bg-image{
                background-image: none;
                background-color:aqua;
            }
               
             .bg1-image{
                background-image: url('download (2).jpg');
            }
            .bg2-image{
                background-repeat: space;
                max-width:2156px;
                background-image: url('download (3).jpg');
            }
            .gradient{
                background-image: linear-gradient(to left, blue ,rgb(106, 106, 182),rgb(232, 232, 247));
            }
           .radial-bg{
            background-image: radial-gradient(circle at center, white,red,red,brown )
           }
           .repeat-bg{
            background-image: repeating-linear-gradient(45deg,yellow 0px, rgb(211, 181, 11) 60px,yellow 90px);
           }

        </style>
    </head>
    <body>
        <div class="bg-image"></div>
        <div class="bg1-image"></div> 
        <div class="bg2-image"></div>
        <div class="gradient"></div>
        <div class="radial-bg"></div>
        <div class="repeat-bg"></div>
    </body>
</html>
