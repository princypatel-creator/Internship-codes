<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap" rel="stylesheet">
    <style>
 :root{
    --primary-color: #e7bfbf;
    --secondary-color: rgb(216, 47, 75);
 }
 header{
    background-color: var(--primary-color);
    padding: 20px;
     border-radius: 5px;
     margin-bottom: 1px;
 }
       .nav-links {
            display: flex;
            justify-content: space-around;
           background-color: var(--primary-color);
            padding: 10px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size:29px;
        }
        a{
            text-decoration: none;
            color: var(--secondary-color);
            font-size: 38px;
        
        }
        .logo{
            font-size: 40px;
            font-weight: bold;
            margin-left: 0px;
            padding: 0px;
        }
      img{
        width: 100%;
        height: auto;
        padding-top:23px;
        border-radius: 10px;
        outline:  4px solid var(--primary-color);
      }
    table{
        padding: 20px;
        height: 100%;
        background-color: var(--primary-color);
    }
    .para-main{
        padding: 20px;
        font-family:"Caveat Brush", cursive;
         font-size: 38px;
         color: var(--secondary-color);
         text-align: justify;
         animation: fadeIn 2s ease-in-out forwards;
    }
    @keyframes fadeIn{
        from{
            opacity: 0;
        }                       
        to{
            opacity: 1;
            font-size: 48px;
            padding: 50px;
        }
    }
    .para-main p{
        font-family: "Playwrite GB J", serif;
        font-size: 29px;
        font-weight: 400;
         text-align: justify;   
    }
    h1{
        font-family: "Caveat Brush", cursive;
        font-size: 88px;
        font-weight: 400;
         text-align: justify; 
    }
    </style>
</head>
<body>
   <header>
         <nav class="nav-links">
            <a href="#" class="logo">Welcome to site</a>
            <a href="About.html">Home</a>
            <a href="Projects.html">About</a>
            <a href="Services.html">Projects</a>
            <a href="Contact.html">Contact</a>
        </nav>
   </header>
   <table>
    <tr>
        <td class="para-main" width="50%" height="100%">
      
            <h1>Welcome to My Portfolio</h1>
            <p><span id="typewriter" data-text="This is a brief introduction about myself and my work. I am passionate about web development and design, and I have experience in creating responsive and user-friendly websites. Please feel free to explore my projects and contact me for any inquiries."></span></p>
        </td>
        <td width="75%">
            <img src="https://cdn.publish0x.com/prod/fs/images/6b898a6811c87d963bac7931b70ed62bee81a32cd989f2459e7100b295a2b07b.jpg">
        </td>
    </tr>
   </table>
   <script>
        document.addEventListener('DOMContentLoaded', function () {
            const typeEl = document.getElementById('typewriter');
            const fullText = typeEl.dataset.text;
            let index = 0;
            typeEl.textContent = '';
            function typeNext() {
                if (index < fullText.length) {
                    typeEl.textContent += fullText.charAt(index);
                    index += 1;
                    setTimeout(typeNext, 45);
                }
            }
            typeNext();
        });
    </script>

</body>
</html>
